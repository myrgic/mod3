<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mod³ Trace Panel</title>
<style>
  :root {
    --bg: #0d1117; --surface: #161b22; --border: #30363d;
    --text: #e6edf3; --muted: #8b949e; --accent: #58a6ff;
    --green: #3fb950; --orange: #d29922; --red: #f85149;
    /* Phase colors */
    --phase-stt:       #58a6ff; /* blue  — STT capture/transcribe */
    --phase-agent:     #d29922; /* amber — agent dispatch */
    --phase-provider:  #bc8cff; /* purple — provider/LLM call */
    --phase-tool:      #3fb950; /* green — tool execute */
    --phase-tts:       #f78166; /* salmon — TTS synthesize */
    --phase-tts-play:  #ff9f43; /* orange — TTS playback start */
    --phase-total:     #30363d; /* grey — turn total bar */
    --phase-kernel:    #79c0ff; /* light blue — kernel sub-spans */
    --phase-speculative: #6e40c9; /* muted purple — speculative output */
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); line-height: 1.5; min-height: 100vh; display: flex; flex-direction: column; }

  /* Header */
  .header {
    display: flex; align-items: center; gap: 16px;
    padding: 12px 24px; border-bottom: 1px solid var(--border);
    background: var(--surface); flex-shrink: 0;
  }
  .header h1 { font-size: 1.2rem; margin-right: auto; }
  .header h1 .sub { color: var(--muted); font-weight: 400; font-size: 0.95rem; margin-left: 8px; }
  .tabs { display: flex; gap: 4px; margin-right: 16px; }
  .tab {
    padding: 6px 12px; text-decoration: none;
    color: var(--muted); font-size: 0.85rem;
    border: 1px solid transparent; border-radius: 4px;
    transition: color 0.15s, background 0.15s, border-color 0.15s;
  }
  .tab:hover { color: var(--text); background: var(--bg); }
  .tab.active { color: var(--accent); border-color: var(--accent); background: var(--surface); }

  /* Controls */
  .controls {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 24px; border-bottom: 1px solid var(--border);
    background: var(--surface); flex-shrink: 0; flex-wrap: wrap;
  }
  .controls label { font-size: 0.75rem; color: var(--muted); }
  .controls input[type=range] { width: 80px; }
  .controls select, .controls input[type=text] {
    background: var(--bg); border: 1px solid var(--border); border-radius: 4px;
    padding: 4px 8px; color: var(--text); font-size: 0.8rem;
  }
  .btn-sm {
    background: var(--bg); border: 1px solid var(--border); border-radius: 4px;
    padding: 4px 10px; color: var(--text); font-size: 0.8rem; cursor: pointer;
  }
  .btn-sm:hover { border-color: var(--accent); color: var(--accent); }
  .btn-sm.danger { border-color: var(--red); color: var(--red); }
  .conn-status { font-size: 0.75rem; color: var(--muted); display: flex; align-items: center; gap: 6px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); }
  .dot.ok { background: var(--green); animation: pulse 2s infinite; }
  .dot.err { background: var(--red); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

  /* Main */
  .main { flex: 1; display: flex; flex-direction: column; padding: 0; gap: 0; overflow: hidden; min-height: 0; }

  /* Legend */
  .legend {
    display: flex; gap: 12px; flex-wrap: wrap; flex-shrink: 0;
    font-size: 0.72rem; color: var(--muted);
  }
  .legend-item { display: flex; align-items: center; gap: 4px; }
  .legend-swatch { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }

  /* Turn list */
  .turns-container { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; min-height: 0; }

  /* Turn card */
  .turn-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 6px; overflow: hidden;
  }
  .turn-header {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 12px; cursor: pointer; user-select: none;
    font-size: 0.8rem; border-bottom: 1px solid transparent;
    transition: background 0.1s;
  }
  .turn-header:hover { background: rgba(255,255,255,0.04); }
  .turn-header.expanded { border-bottom-color: var(--border); }
  .turn-idx { font-size: 0.7rem; color: var(--muted); min-width: 28px; }
  .turn-ts { font-size: 0.7rem; color: var(--muted); min-width: 80px; font-variant-numeric: tabular-nums; }
  .turn-session { font-size: 0.7rem; color: var(--muted); font-family: monospace; min-width: 90px; overflow: hidden; text-overflow: ellipsis; }
  .turn-total-ms { font-size: 0.72rem; color: var(--orange); min-width: 60px; font-variant-numeric: tabular-nums; text-align: right; }
  .turn-chevron { margin-left: auto; font-size: 0.7rem; color: var(--muted); transition: transform 0.15s; }
  .turn-chevron.open { transform: rotate(90deg); }

  /* ── Hierarchical span tree (replaces flat Gantt) ────────────────────── */

  /* Two-pane layout: tree | details */
  .trace-shell {
    display: grid;
    grid-template-columns: 1fr 320px;
    gap: 0;
    flex: 1;
    overflow: hidden;
    min-height: 0;
  }
  .tree-pane {
    display: flex;
    flex-direction: column;
    overflow: hidden;
    border-right: 1px solid var(--border);
  }
  .details-pane {
    display: flex;
    flex-direction: column;
    background: var(--surface);
    overflow: hidden;
  }
  .details-pane-header {
    padding: 8px 12px;
    font-size: 0.7rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  #details-pane-body {
    flex: 1;
    overflow-y: auto;
    padding: 10px 12px;
    font-size: 0.75rem;
    font-family: monospace;
    color: var(--muted);
    white-space: pre-wrap;
    word-break: break-word;
  }
  .details-empty { color: var(--muted); font-style: italic; font-size: 0.8rem; font-family: inherit; }

  /* Turn list (scrollable) */
  .turns-container { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; min-height: 0; padding: 8px 0; }

  /* Turn card */
  .turn-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 6px; overflow: hidden; margin: 0 8px;
  }
  .turn-header {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 12px; cursor: pointer; user-select: none;
    font-size: 0.8rem; border-bottom: 1px solid transparent;
    transition: background 0.1s;
  }
  .turn-header:hover { background: rgba(255,255,255,0.04); }
  .turn-header.expanded { border-bottom-color: var(--border); }
  .turn-idx { font-size: 0.7rem; color: var(--muted); min-width: 28px; }
  .turn-ts { font-size: 0.7rem; color: var(--muted); min-width: 80px; font-variant-numeric: tabular-nums; }
  .turn-session { font-size: 0.7rem; color: var(--muted); font-family: monospace; min-width: 90px; overflow: hidden; text-overflow: ellipsis; }
  .turn-total-ms { font-size: 0.72rem; color: var(--orange); min-width: 60px; font-variant-numeric: tabular-nums; text-align: right; }
  .turn-chevron { margin-left: auto; font-size: 0.7rem; color: var(--muted); transition: transform 0.15s; }
  .turn-chevron.open { transform: rotate(90deg); }

  /* Span tree */
  .span-tree { padding: 6px 0; }
  .span-row {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 3px 8px;
    cursor: pointer;
    font-size: 0.78rem;
    border-radius: 3px;
    transition: background 0.1s;
    min-height: 26px;
  }
  .span-row:hover { background: rgba(255,255,255,0.04); }
  .span-row.selected { background: rgba(88,166,255,0.1); }
  .span-indent { flex-shrink: 0; }
  .span-toggle {
    width: 14px; height: 14px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.65rem; color: var(--muted);
    cursor: pointer;
  }
  .span-toggle.open { transform: rotate(90deg); }
  .span-toggle.leaf { color: transparent; pointer-events: none; }
  .span-swatch { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }
  .span-name { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .span-dur { font-size: 0.7rem; color: var(--orange); font-variant-numeric: tabular-nums; white-space: nowrap; flex-shrink: 0; }
  .span-badges { display: flex; gap: 4px; flex-shrink: 0; }
  .span-badge {
    font-size: 0.62rem; padding: 1px 5px; border-radius: 8px;
    background: var(--bg); border: 1px solid var(--border); color: var(--muted);
    white-space: nowrap;
  }

  /* Duration bar — proportional to parent's window */
  .span-bar-wrap {
    min-width: 60px; max-width: 100px; height: 4px;
    background: rgba(255,255,255,0.06); border-radius: 2px;
    flex-shrink: 0; position: relative; overflow: hidden;
  }
  .span-bar-fill {
    position: absolute; top: 0; left: 0; height: 100%;
    border-radius: 2px; transition: width 0.2s;
  }
  .span-bar-fill.speculative {
    background: repeating-linear-gradient(
      45deg, var(--phase-speculative), var(--phase-speculative) 3px,
      rgba(110,64,201,0.3) 3px, rgba(110,64,201,0.3) 6px
    );
  }

  /* Children container */
  .span-children { display: none; }
  .span-children.open { display: block; }

  /* Filter bar in controls */
  #span-filter { width: 160px; }

  /* Turn detail (hidden, kept for compat) */
  .turn-detail { display: none; }

  /* Speculative block indicator in tree */
  .span-row.speculative { opacity: 0.7; font-style: italic; }

  /* Error span */
  .span-row.error .span-name { color: var(--red); }

  /* Empty state */
  .empty { text-align: center; color: var(--muted); padding: 60px 0; font-size: 0.9rem; }
  .empty .hint { font-size: 0.78rem; margin-top: 8px; }

  /* Tooltip (kept for future use) */
  .tooltip { display: none; }
</style>
</head>
<body>

<header class="header">
  <h1>Mod³ <span class="sub">Trace Panel</span></h1>
  <nav class="tabs">
    <a class="tab" href="/dashboard">Dashboard</a>
    <a class="tab" href="/dashboard/console.html">Console</a>
    <a class="tab" href="/dashboard/voice-lab.html">Voice Lab</a>
    <a class="tab" href="/dashboard/sessions.html">Sessions</a>
    <a class="tab active" href="/dashboard/trace-panel.html">Traces</a>
  </nav>
</header>

<div class="controls">
  <div class="conn-status">
    <div class="dot" id="mod3-dot"></div>
    <span id="mod3-label">mod3 —</span>
  </div>
  <div class="conn-status" style="margin-left:8px">
    <div class="dot" id="kernel-dot"></div>
    <span id="kernel-label">kernel —</span>
  </div>

  <label style="margin-left:16px">Session:
    <input type="text" id="session-filter" placeholder="all" style="width:120px;margin-left:4px">
  </label>

  <label>Filter spans:
    <input type="text" id="span-filter" placeholder="e.g. thinking" style="margin-left:4px">
  </label>

  <label>Max turns:
    <select id="max-turns">
      <option value="20">20</option>
      <option value="50" selected>50</option>
      <option value="100">100</option>
    </select>
  </label>

  <button class="btn-sm" id="pause-btn">Pause</button>
  <button class="btn-sm danger" id="clear-btn">Clear</button>

  <span id="event-count" style="font-size:0.72rem;color:var(--muted);margin-left:auto"></span>
</div>

<div class="main">
  <!-- Trace shell: turn list (left) + details pane (right) -->
  <div class="trace-shell">
    <div class="tree-pane">
      <!-- Turn cards with span trees -->
      <div class="turns-container" id="turns-container">
        <div class="empty" id="empty-state">
          Waiting for trace events…
          <div class="hint">Send a chat message or speak to the dashboard to see turns appear here.</div>
        </div>
      </div>
    </div>

    <div class="details-pane" id="details-pane">
      <div class="details-pane-header">Span Details</div>
      <div id="details-pane-body">
        <span class="details-empty">Click a span row to inspect its attributes.</span>
      </div>
    </div>
  </div>
</div>

<!-- Tooltip -->
<div class="tooltip" id="tooltip" style="display:none"></div>

<script>
// ── Config ───────────────────────────────────────────────────────────────────
const MOD3_URL   = location.origin;                    // same origin
const KERNEL_URL = 'http://localhost:6931';

// ── State ────────────────────────────────────────────────────────────────────
let paused = false;
let turns  = [];          // array of TurnGroup objects
let turnIndex = 0;
let mod3Events   = 0;
let kernelEvents = 0;

// Map from message_id → turn group index
const msgIdToTurn = {};

// ── Expand-state preservation ─────────────────────────────────────────────────
// Set of turn keys that the operator has explicitly expanded or collapsed.
// Key = stable turn identifier (messageId if present, else "t<idx>").
// Value: true = expanded, false = collapsed (explicit operator choice).
const expandedByOp = new Map(); // key → boolean (op-explicit)
let newestTurnKey = null;       // auto-expand only the most recent turn

function turnKey(t) {
  return t.messageId || ('t' + t.idx);
}

// ── Phase color map ───────────────────────────────────────────────────────────
const PHASE_COLORS = {
  'stt_capture':          'var(--phase-stt)',
  'stt_transcribe':       'var(--phase-stt)',
  'agent_dispatch':       'var(--phase-agent)',
  'provider_call':        'var(--phase-provider)',
  'tool_execute':         'var(--phase-tool)',
  'tts_synthesize':       'var(--phase-tts)',
  'tts_playback_start':   'var(--phase-tts-play)',
  'turn_total':           'var(--phase-total)',
  // kernel sub-spans
  'chat.prompt_eval':          'var(--phase-kernel)',
  'chat.thinking_generation':  '#b388ff',
  'chat.answer_generation':    'var(--phase-provider)',
  'chat.tool_call_resolution': 'var(--phase-tool)',
};

function phaseColor(name) {
  return PHASE_COLORS[name] || 'var(--muted)';
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function fmtMs(ms) {
  if (ms == null) return '—';
  if (ms < 1000) return ms + 'ms';
  return (ms / 1000).toFixed(1) + 's';
}

function fmtTs(isoStr) {
  if (!isoStr) return '';
  const d = new Date(isoStr);
  return d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', second:'2-digit', fractionalSecondDigits:1});
}

function shortSession(id) {
  if (!id) return '—';
  return id.length > 12 ? id.slice(0, 12) + '…' : id;
}

// ── SSE connection ────────────────────────────────────────────────────────────
function connectMod3() {
  const dot   = document.getElementById('mod3-dot');
  const label = document.getElementById('mod3-label');

  // First load recent events from the ring buffer
  fetch(MOD3_URL + '/v1/logs/chat-flow?limit=200')
    .then(r => r.json())
    .then(events => {
      if (Array.isArray(events)) {
        events.forEach(processMod3Event);
      }
    })
    .catch(() => {});

  // Then stream new events.
  // The mod3 SSE endpoint sends named events: `event: chat_flow` + `data: ...`
  // Named events do NOT fire `onmessage` — they require addEventListener().
  const es = new EventSource(MOD3_URL + '/v1/logs/chat-flow/stream');
  es.onopen = () => { dot.className = 'dot ok'; label.textContent = 'mod3 live'; };
  es.onerror = () => { dot.className = 'dot err'; label.textContent = 'mod3 disconnected'; };
  es.addEventListener('chat_flow', (e) => {
    if (paused) return;
    try {
      const ev = JSON.parse(e.data);
      processMod3Event(ev);
    } catch {}
  });
  return es;
}

function connectKernel() {
  const dot   = document.getElementById('kernel-dot');
  const label = document.getElementById('kernel-label');

  const es = new EventSource(KERNEL_URL + '/v1/bus/bus_traces/stream');
  es.onopen = () => { dot.className = 'dot ok'; label.textContent = 'kernel live'; };
  es.onerror = () => { dot.className = 'dot err'; label.textContent = 'kernel disconnected'; };
  es.onmessage = (e) => {
    if (paused) return;
    try {
      const block = JSON.parse(e.data);
      processKernelEvent(block);
    } catch {}
  };
  return es;
}

// ── TurnGroup management ──────────────────────────────────────────────────────
// Clustering window for voice-path turns (no trace_id AND no message_id): 30 seconds.
// This is now a last-resort fallback only — PR #60 ensures all 8 phase events
// carry trace_id, so timestamp clustering is no longer the primary grouping key.
const VOICE_CLUSTER_WINDOW_MS = 30_000;

// Map from trace_id (32-hex) → turn group index.
// Primary grouping key since PR #60 guarantees all phase events carry trace_id.
const traceIdToTurn = {};

function getOrCreateTurn(messageId, sessionId, ts, traceId) {
  // 1. trace_id match — primary key when available (PR #60 guarantees this for
  //    all 8 phase events). Prevents slow-turn STT for turn N+1 from clustering
  //    into turn N's card even when the 30s window would otherwise match.
  if (traceId && traceIdToTurn[traceId] != null) {
    return turns[traceIdToTurn[traceId]];
  }

  // 2. Stable message_id match — wins for text-path turns that share a trace_id
  //    but where we may not have seen the trace_id yet on a first event.
  if (messageId && msgIdToTurn[messageId] != null) {
    return turns[msgIdToTurn[messageId]];
  }

  // 3. Fallback: timestamp clustering for events that genuinely lack both
  //    trace_id and message_id (should be rare/never after PR #60).
  if (!traceId && !messageId && ts) {
    console.warn('[trace-panel] event with no trace_id and no message_id — falling back to timestamp clustering', { sessionId, ts });
    const evTime = new Date(ts).getTime();
    for (let i = turns.length - 1; i >= 0; i--) {
      const t = turns[i];
      if (t.messageId || t.traceId) continue; // skip turns already anchored by id
      if (t.sessionId !== (sessionId || '')) continue;
      const tTime = new Date(t.ts).getTime();
      if (Math.abs(evTime - tTime) <= VOICE_CLUSTER_WINDOW_MS) {
        return t;
      }
    }
  }

  // 4. New turn.
  const t = {
    idx:       ++turnIndex,
    messageId: messageId || null,
    traceId:   traceId   || null,
    sessionId: sessionId || '',
    ts:        ts || new Date().toISOString(),
    phases:    [],      // {name, duration_ms, ts, ok, tokens, trace_id}
    kernelSpans: [],    // kernel sub-spans from bus_traces
    toolCalls: [],      // tool call records (from tool_execute phases)
    speculative: null,  // {text, bargein_ms, text_offset}
    totalMs:   null,
  };
  turns.push(t);
  if (messageId) msgIdToTurn[messageId] = turns.length - 1;
  if (traceId)   traceIdToTurn[traceId]  = turns.length - 1;

  // Track newest key for auto-expand logic.
  newestTurnKey = turnKey(t);

  return t;
}

function processMod3Event(ev) {
  const et = ev.event_type || '';
  const sid = ev.session_id || '';
  const msgId = ev.message_id || '';
  const ts = ev.ts || '';
  const evTraceId = ev.trace_id || '';

  // Phase events
  if (et.startsWith('chat.phase.')) {
    const phaseName = ev.phase_name || et.replace('chat.phase.', '');
    const turn = getOrCreateTurn(msgId, sid, ts, evTraceId);
    const entry = {
      name:        phaseName,
      duration_ms: ev.duration_ms,
      ts:          ts,           // wall-clock end timestamp for Gantt positioning
      ok:          ev.ok !== false,
      tokens:      ev.tokens || null,
      trace_id:    ev.trace_id || null,
    };
    if (phaseName === 'turn_total') {
      turn.totalMs = ev.duration_ms;
    }
    // Check for tool call detail
    if (phaseName === 'tool_execute' && ev.tool_name) {
      turn.toolCalls.push({
        name:       ev.tool_name,
        args:       ev.tool_args || null,
        duration_ms: ev.duration_ms,
      });
    }
    turn.phases.push(entry);
    mod3Events++;
    scheduleRender();
    return;
  }

  // Bargein event — creates speculative block
  if (et === 'bargein.event') {
    const turn = getOrCreateTurn(msgId, sid, ts, evTraceId);
    turn.speculative = {
      text_actually_played: ev.text_actually_played || '',
      text_speculative:     ev.text_speculative || '',
      bargein_position_ms:  ev.bargein_position_ms || null,
      text_offset:          ev.bargein_position_text_offset || null,
    };
    mod3Events++;
    scheduleRender();
    return;
  }

  mod3Events++;
}

function processKernelEvent(envelope) {
  // The bus SSE stream sends busSSEEnvelope: {id, type, timestamp, data: BusBlock}
  // where BusBlock is {seq, type, payload, hash, ts, ...}.
  // The actual event type and payload live inside envelope.data, not at the top level.
  const busBlock  = envelope.data || envelope;          // tolerate both shapes
  const blockType = busBlock.type || envelope.type || '';
  const payload   = busBlock.payload || {};              // the ChatSubSpan fields

  if (blockType === 'kernel.handler.span.v1') {
    // Handler-level span — no chat correlation needed; just count it.
    kernelEvents++;
    scheduleRender();
    return;
  }

  // Chat sub-spans emitted by cogos handle_chat
  // event type: "kernel.chat.subspan.v1"
  // payload.span_name: "chat.prompt_eval" | "chat.thinking_generation" |
  //                    "chat.answer_generation" | "chat.tool_call_resolution"
  if (blockType === 'kernel.chat.subspan.v1') {
    const spanName = payload.span_name || '';
    if (!spanName) { kernelEvents++; return; }

    const sid     = payload.session_id || '';
    const traceId = payload.trace_id   || '';

    // Correlate to turn: prefer trace_id (primary key from PR #60 + cogos #262).
    let turn = null;
    if (traceId) {
      if (traceIdToTurn[traceId] != null) {
        turn = turns[traceIdToTurn[traceId]];
      }
      if (!turn) {
        // Scan phase-level trace_id fields (in case index isn't populated yet)
        for (let i = turns.length - 1; i >= 0; i--) {
          if (turns[i].traceId === traceId) { turn = turns[i]; break; }
          for (const p of turns[i].phases) {
            if (p.trace_id === traceId) { turn = turns[i]; break; }
          }
          if (turn) break;
        }
      }
    }
    // Fallback: most recent turn for this session
    if (!turn && sid) {
      for (let i = turns.length - 1; i >= 0; i--) {
        if (turns[i].sessionId === sid) { turn = turns[i]; break; }
      }
    }
    if (!turn && turns.length > 0) {
      turn = turns[turns.length - 1];
    }

    if (turn) {
      turn.kernelSpans.push({
        name:          spanName,
        duration_ms:   payload.duration_ms,
        tokens_think:  payload.tokens_think  || null,
        tokens_answer: payload.tokens_answer || null,
        tokens_total:  payload.tokens_total  || null,
        tool_count:    payload.tool_calls    || null, // kernel emits "tool_calls" not "tool_call_count"
      });
    } else {
      console.warn('[trace-panel] kernel sub-span: no matching turn', { spanName, traceId, sid });
    }
    kernelEvents++;
    scheduleRender();
  }
}

// ── Span tree helpers ─────────────────────────────────────────────────────────

// Build a unified span list from a turn's phases + kernelSpans.
// Returns an array of SpanNode objects with children arrays (tree structure).
function buildSpanTree(t) {
  // Root span: the turn itself
  const turnDuration = t.totalMs || t.phases.reduce((s, p) => s + (p.duration_ms || 0), 0);
  const root = {
    id: 'turn-' + turnKey(t),
    name: 'turn #' + t.idx,
    duration_ms: turnDuration,
    parentId: null,
    isRoot: true,
    attrs: {
      session_id: t.sessionId,
      trace_id: t.traceId,
      ts: t.ts,
    },
    children: [],
  };

  // Phase spans as children of root
  const phaseById = {};
  for (const p of t.phases) {
    if (p.name === 'turn_total') continue; // represented by root
    const span = {
      id: root.id + ':' + p.name,
      name: p.name,
      duration_ms: p.duration_ms,
      parentId: root.id,
      isPhase: true,
      ok: p.ok !== false,
      attrs: {
        duration_ms: p.duration_ms,
        ts: p.ts,
        ok: p.ok !== false,
        trace_id: p.trace_id,
        tokens: p.tokens,
      },
      children: [],
    };
    phaseById[p.name] = span;
    root.children.push(span);
  }

  // Kernel sub-spans as children of provider_call (or root if missing)
  const providerSpan = phaseById['provider_call'] || root;
  for (const k of t.kernelSpans) {
    const span = {
      id: root.id + ':kernel:' + k.name + ':' + Math.random().toString(36).slice(2, 6),
      name: k.name,
      duration_ms: k.duration_ms,
      parentId: providerSpan.id,
      isKernel: true,
      attrs: {
        duration_ms: k.duration_ms,
        tokens_think: k.tokens_think,
        tokens_answer: k.tokens_answer,
        tokens_total: k.tokens_total,
        tool_calls: k.tool_count,
      },
      children: [],
    };
    providerSpan.children.push(span);
  }

  // Tool calls as children of tool_execute phases
  for (const tc of t.toolCalls) {
    const toolSpan = phaseById['tool_execute'];
    const parent = toolSpan || root;
    const span = {
      id: root.id + ':tool:' + tc.name,
      name: tc.name,
      duration_ms: tc.duration_ms,
      parentId: parent.id,
      isTool: true,
      attrs: {
        duration_ms: tc.duration_ms,
        args: tc.args,
      },
      children: [],
    };
    parent.children.push(span);
  }

  // Speculative block as a special child of root
  if (t.speculative) {
    const s = t.speculative;
    root.children.push({
      id: root.id + ':speculative',
      name: 'speculative output (unsaid)',
      duration_ms: null,
      parentId: root.id,
      isSpeculative: true,
      attrs: {
        text_actually_played: s.text_actually_played,
        text_speculative: s.text_speculative,
        bargein_position_ms: s.bargein_position_ms,
        text_offset: s.text_offset,
      },
      children: [],
    });
  }

  return root;
}

// Color by span type
function spanColor(span) {
  if (span.isSpeculative) return 'var(--phase-speculative)';
  if (span.isTool) return 'var(--phase-tool)';
  if (span.isRoot) return 'var(--border)';
  if (span.isKernel) return PHASE_COLORS[span.name] || 'var(--phase-kernel)';
  return phaseColor(span.name);
}

// ── Render ────────────────────────────────────────────────────────────────────
let renderScheduled = false;
function scheduleRender() {
  if (!renderScheduled) {
    renderScheduled = true;
    requestAnimationFrame(() => { renderScheduled = false; renderAll(); });
  }
}

function renderAll() {
  const container = document.getElementById('turns-container');
  const sessionFilter = document.getElementById('session-filter').value.trim().toLowerCase();
  const maxT = parseInt(document.getElementById('max-turns').value) || 50;
  const empty = document.getElementById('empty-state');

  let filtered = turns;
  if (sessionFilter) {
    filtered = turns.filter(t => t.sessionId.toLowerCase().includes(sessionFilter));
  }

  // Keep only most recent maxT
  const visible = filtered.slice(-maxT).reverse(); // newest first

  if (visible.length === 0) {
    empty.style.display = '';
  } else {
    empty.style.display = 'none';
  }

  // Diff-based render: update existing cards in place, add/remove as needed.
  // Strategy: build a map of existing card elements by turn key, then reconcile.
  const existingCards = new Map();
  Array.from(container.querySelectorAll('.turn-card')).forEach(el => {
    const k = el.dataset.turnKey;
    if (k) existingCards.set(k, el);
  });

  // Keys that should be in the view
  const visibleKeys = new Set(visible.map(turnKey));

  // Remove cards no longer in view
  for (const [k, el] of existingCards) {
    if (!visibleKeys.has(k)) {
      el.remove();
      existingCards.delete(k);
    }
  }

  // Rebuild each visible turn card.
  // We always rebuild the card DOM (it's cheap for ≤100 turns) but preserve
  // expand state by reading/writing expandedByOp before and after.
  const fragment = document.createDocumentFragment();
  for (const t of visible) {
    const k = turnKey(t);
    // Determine expand state:
    //   - operator explicitly toggled → honour it
    //   - newest turn → auto-expand (unless operator collapsed it)
    //   - all others → collapsed
    let shouldExpand = false;
    if (expandedByOp.has(k)) {
      shouldExpand = expandedByOp.get(k);
    } else {
      shouldExpand = (k === newestTurnKey);
    }

    const card = buildTurnCard(t, shouldExpand);
    fragment.appendChild(card);
  }

  // Remove remaining stale cards (before empty state)
  Array.from(container.querySelectorAll('.turn-card')).forEach(el => el.remove());

  container.insertBefore(fragment, empty);

  // Ensure empty state is last.
  container.appendChild(empty);

  // Update counters
  document.getElementById('event-count').textContent =
    `${mod3Events} mod3 events / ${kernelEvents} kernel spans / ${turns.length} turns`;
}

// ── Span tree render ──────────────────────────────────────────────────────────

// Global selected span id (for DetailsView)
let selectedSpanId = null;

// Span expand state: spanId → bool
const spanExpanded = new Map();

// Get span filter string
function getSpanFilter() {
  const el = document.getElementById('span-filter');
  return el ? el.value.trim().toLowerCase() : '';
}

// Check if a span or any of its descendants match the filter
function spanMatchesFilter(span, filter) {
  if (!filter) return true;
  if (span.name.toLowerCase().includes(filter)) return true;
  return span.children.some(c => spanMatchesFilter(c, filter));
}

// Build a span row DOM element
function buildSpanRow(span, depth, parentDurationMs, filter) {
  const container = document.createElement('div');

  const row = document.createElement('div');
  row.className = 'span-row' +
    (span.isSpeculative ? ' speculative' : '') +
    (!span.ok && span.ok != null ? ' error' : '') +
    (span.id === selectedSpanId ? ' selected' : '');
  row.dataset.spanId = span.id;

  // Indent
  const indent = document.createElement('span');
  indent.className = 'span-indent';
  indent.style.display = 'inline-block';
  indent.style.width = (depth * 16) + 'px';
  row.appendChild(indent);

  // Toggle (expand/collapse)
  const toggle = document.createElement('span');
  const hasChildren = span.children.length > 0;
  toggle.className = 'span-toggle' + (hasChildren ? '' : ' leaf');
  toggle.textContent = hasChildren ? '▶' : '·';
  if (hasChildren) {
    const isOpen = spanExpanded.has(span.id) ? spanExpanded.get(span.id) : (depth === 0);
    if (isOpen) toggle.classList.add('open');
  }
  row.appendChild(toggle);

  // Color swatch
  const swatch = document.createElement('span');
  swatch.className = 'span-swatch';
  swatch.style.background = spanColor(span);
  row.appendChild(swatch);

  // Name
  const nameEl = document.createElement('span');
  nameEl.className = 'span-name';
  // Highlight filter match
  if (filter && span.name.toLowerCase().includes(filter)) {
    const idx = span.name.toLowerCase().indexOf(filter);
    nameEl.innerHTML =
      escapeSpanName(span.name.slice(0, idx)) +
      '<mark style="background:rgba(210,153,34,0.3);border-radius:2px">' +
      escapeSpanName(span.name.slice(idx, idx + filter.length)) +
      '</mark>' +
      escapeSpanName(span.name.slice(idx + filter.length));
  } else {
    nameEl.textContent = span.name;
  }
  row.appendChild(nameEl);

  // Duration bar (proportional to parent or turn)
  if (span.duration_ms != null) {
    const barWrap = document.createElement('span');
    barWrap.className = 'span-bar-wrap';
    const barFill = document.createElement('span');
    barFill.className = 'span-bar-fill' + (span.isSpeculative ? ' speculative' : '');
    const pct = parentDurationMs > 0
      ? Math.min((span.duration_ms / parentDurationMs) * 100, 100)
      : 50;
    barFill.style.width = pct + '%';
    barFill.style.background = span.isSpeculative ? '' : spanColor(span);
    barWrap.appendChild(barFill);
    row.appendChild(barWrap);
  }

  // Duration label
  const durEl = document.createElement('span');
  durEl.className = 'span-dur';
  durEl.textContent = span.duration_ms != null ? fmtMs(span.duration_ms) : '';
  row.appendChild(durEl);

  // Badges (tokens, model)
  const badges = buildSpanBadges(span);
  if (badges) {
    row.appendChild(badges);
  }

  // Click: select span → show details; toggle expand if has children
  row.addEventListener('click', (e) => {
    e.stopPropagation();
    // Select
    const prev = document.querySelector('.span-row.selected');
    if (prev) prev.classList.remove('selected');
    row.classList.add('selected');
    selectedSpanId = span.id;
    showSpanDetails(span);
    // Toggle expand if has children
    if (hasChildren) {
      const wasOpen = spanExpanded.has(span.id) ? spanExpanded.get(span.id) : (depth === 0);
      const nowOpen = !wasOpen;
      spanExpanded.set(span.id, nowOpen);
      toggle.classList.toggle('open', nowOpen);
      children.classList.toggle('open', nowOpen);
    }
  });

  container.appendChild(row);

  // Children container
  const children = document.createElement('div');
  children.className = 'span-children';
  const isOpen = spanExpanded.has(span.id) ? spanExpanded.get(span.id) : (depth === 0);
  if (isOpen) children.classList.add('open');

  for (const child of span.children) {
    if (filter && !spanMatchesFilter(child, filter)) continue;
    children.appendChild(buildSpanRow(child, depth + 1, span.duration_ms || parentDurationMs, filter));
  }
  container.appendChild(children);

  return container;
}

function escapeSpanName(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function buildSpanBadges(span) {
  const parts = [];
  const a = span.attrs || {};
  if (a.tokens != null) parts.push(a.tokens + ' tok');
  if (a.tokens_think != null) parts.push(a.tokens_think + ' think');
  if (a.tokens_answer != null) parts.push(a.tokens_answer + ' ans');
  if (a.tokens_total != null) parts.push(a.tokens_total + ' tot');
  if (a.tool_calls != null) parts.push(a.tool_calls + ' tools');
  if (!parts.length) return null;
  const wrap = document.createElement('span');
  wrap.className = 'span-badges';
  for (const p of parts) {
    const b = document.createElement('span');
    b.className = 'span-badge';
    b.textContent = p;
    wrap.appendChild(b);
  }
  return wrap;
}

function showSpanDetails(span) {
  const body = document.getElementById('details-pane-body');
  if (!body) return;
  const attrs = { name: span.name, duration_ms: span.duration_ms, ...(span.attrs || {}) };
  // Remove null values for cleanliness
  const clean = Object.fromEntries(Object.entries(attrs).filter(([, v]) => v != null));
  body.textContent = JSON.stringify(clean, null, 2);
}

function buildTurnCard(t, initiallyExpanded) {
  const card = document.createElement('div');
  card.className = 'turn-card';
  card.dataset.turnKey = turnKey(t);

  const k = turnKey(t);

  // Header
  const hdr = document.createElement('div');
  hdr.className = 'turn-header' + (initiallyExpanded ? ' expanded' : '');
  hdr.innerHTML = `
    <span class="turn-idx">#${t.idx}</span>
    <span class="turn-ts">${fmtTs(t.ts)}</span>
    <span class="turn-session">${shortSession(t.sessionId)}</span>
    <span style="flex:1"></span>
    <span class="turn-total-ms">${fmtMs(t.totalMs)}</span>
    <span class="turn-chevron${initiallyExpanded ? ' open' : ''}">▶</span>
  `;
  card.appendChild(hdr);

  // Span tree (shown when expanded)
  const treeWrap = document.createElement('div');
  treeWrap.className = 'span-tree';
  treeWrap.style.display = initiallyExpanded ? 'block' : 'none';

  const filter = getSpanFilter();
  const rootSpan = buildSpanTree(t);
  // Render root's children directly (root turn is shown in the card header)
  for (const child of rootSpan.children) {
    if (filter && !spanMatchesFilter(child, filter)) continue;
    treeWrap.appendChild(buildSpanRow(child, 0, rootSpan.duration_ms, filter));
  }

  card.appendChild(treeWrap);

  // Toggle expand
  const chevron = hdr.querySelector('.turn-chevron');
  hdr.addEventListener('click', () => {
    const isOpen = treeWrap.style.display !== 'none';
    const nowOpen = !isOpen;
    treeWrap.style.display = nowOpen ? 'block' : 'none';
    hdr.classList.toggle('expanded', nowOpen);
    chevron.classList.toggle('open', nowOpen);
    expandedByOp.set(k, nowOpen);
  });

  return card;
}

// ── Controls ──────────────────────────────────────────────────────────────────
document.getElementById('pause-btn').addEventListener('click', (e) => {
  paused = !paused;
  e.target.textContent = paused ? 'Resume' : 'Pause';
  e.target.style.borderColor = paused ? 'var(--orange)' : '';
  e.target.style.color       = paused ? 'var(--orange)' : '';
});

document.getElementById('clear-btn').addEventListener('click', () => {
  turns.length = 0;
  Object.keys(msgIdToTurn).forEach(k => delete msgIdToTurn[k]);
  Object.keys(traceIdToTurn).forEach(k => delete traceIdToTurn[k]);
  expandedByOp.clear();
  newestTurnKey = null;
  turnIndex = 0;
  mod3Events = 0;
  kernelEvents = 0;
  renderAll();
});

document.getElementById('session-filter').addEventListener('input', renderAll);
document.getElementById('max-turns').addEventListener('change', renderAll);
document.getElementById('span-filter').addEventListener('input', renderAll);

// ── Keyboard shortcuts ────────────────────────────────────────────────────────
// Escape : clear the details pane / deselect span
// /      : focus span filter input
document.addEventListener('keydown', e => {
  const tag = (e.target || {}).tagName;
  const inInput = tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT';

  if (e.key === 'Escape' && !e.metaKey && !e.ctrlKey) {
    const body = document.getElementById('details-pane-body');
    if (body) {
      body.innerHTML = '<span class="details-empty">Click a span row to inspect its attributes.</span>';
    }
    // Deselect any selected span row
    document.querySelectorAll('.span-row.selected').forEach(r => r.classList.remove('selected'));
    if (inInput) e.target.blur();
    e.preventDefault();
  }

  if (e.key === '/' && !inInput && !e.metaKey && !e.ctrlKey) {
    const f = document.getElementById('span-filter');
    if (f) { f.focus(); f.select(); e.preventDefault(); }
  }
});

// ── Boot ──────────────────────────────────────────────────────────────────────
connectMod3();
connectKernel();
renderAll();
</script>
</body>
