# mod3/vendor/MANIFEST.toml
# Vendored upstream OSS — rung 1 of the vendoring-as-metabolism ladder.
# Each entry records provenance: upstream, version, SHA, license, files.
# On rung 1: pinned copy, no patches. Move up the ladder if patches accumulate
# or supply-chain risk materialises (rung 2 = local mirror, rung 3 = fork).
# Template: feedback_vendoring_as_metabolism (substrate memory).

schema_version = "1"
updated = "2026-05-16"

# ─────────────────────────────────────────────────────────────────────────────
[pipecat_vad]
# Silero VAD implementation from pipecat-ai/pipecat.
upstream_repo   = "https://github.com/pipecat-ai/pipecat"
upstream_tag    = "v1.2.1"
upstream_sha    = "f8caa0da2b4c0788b9ffe31fbf44d5cdd5189a89"
license         = "BSD-2-Clause"
license_file    = "https://github.com/pipecat-ai/pipecat/blob/main/LICENSE"
vendor_path     = "vendor/pipecat_vad/"
rung            = 1
notes           = """
Files copied:
  src/pipecat/audio/vad/silero.py        → vendor/pipecat_vad/silero.py
  src/pipecat/audio/vad/vad_analyzer.py  → vendor/pipecat_vad/vad_analyzer.py
  src/pipecat/audio/vad/data/silero_vad.onnx → vendor/pipecat_vad/data/silero_vad.onnx

Modifications:
  silero.py: model load path changed from importlib_resources (pipecat package)
  to local vendor/pipecat_vad/data/silero_vad.onnx. Import of pipecat.audio.utils
  inlined into vad_analyzer.py. No functional logic changed.

  vad_analyzer.py: calculate_audio_volume and exp_smoothing inlined
  (upstream imports pipecat.audio.utils which is outside scope of this vendor).
  No functional logic changed.
"""

# ONNX model provenance
[pipecat_vad.model]
filename = "silero_vad.onnx"
source   = "pipecat-ai/pipecat@v1.2.1:src/pipecat/audio/vad/data/silero_vad.onnx"
size_bytes = 2327524
origin   = "snakers4/silero-vad (MIT license)"

# ─────────────────────────────────────────────────────────────────────────────
[smart_turn]
# Smart Turn v3 end-of-utterance detector from pipecat-ai/smart-turn-v3.
# Source repo: pipecat-ai/smart-turn-v3 (HuggingFace model repo, ONNX-canonical)
# NOT pipecat-ai/smart-turn (the PyTorch safetensors repo, ~2.3 GB).
upstream_repo   = "https://huggingface.co/pipecat-ai/smart-turn-v3"
upstream_tag    = ""  # HF model repos use commit SHAs, not tags
upstream_sha    = "f766f81d3cfdf7737ac64aad813d91bbfd56bf93"  # HEAD at 2026-05-16
license         = "BSD-2-Clause"
license_file    = "https://github.com/pipecat-ai/smart-turn/blob/main/LICENSE"
vendor_path     = "vendor/smart_turn/"
rung            = 1
notes           = """
Files copied:
  inference.py   → vendor/smart_turn/inference.py
  audio_utils.py → vendor/smart_turn/audio_utils.py

Modifications:
  inference.py: ONNX_MODEL_PATH changed from relative CWD path to
  vendor-relative absolute path pointing at smart-turn-v3.2-cpu.onnx.
  Lazy session loading added (import-safe when weight file not yet present).
  Import of audio_utils adjusted to vendor-relative import.
  CoreML + CPU execution providers added to build_session() for Apple Silicon
  Neural Engine acceleration (graceful fallback on Linux/Windows).

ONNX weight file is committed directly to the repo at rung 1 (mirrors the
Silero VAD pattern). The int8 CPU export (smart-turn-v3.2-cpu.onnx) is only
8.7 MB — well within git-LFS-free range. No runtime fetch step required.
"""

# ONNX model provenance
[smart_turn.model]
filename          = "smart-turn-v3.2-cpu.onnx"
upstream_repo     = "https://huggingface.co/pipecat-ai/smart-turn-v3"
upstream_revision = "f766f81d3cfdf7737ac64aad813d91bbfd56bf93"
sha256            = "2bb026316b14a660486a75b1733cd3fbab8c2fd0314dc9af7be49f8cca967e4f"
size_bytes        = 8713168
rung              = 1
notes             = """
int8 quantized CPU export from pipecat-ai/smart-turn-v3 benchmarks/.
Downloaded via:
  curl -L https://huggingface.co/pipecat-ai/smart-turn-v3/resolve/main/smart-turn-v3.2-cpu.onnx
No HuggingFace auth required (public model). Committed at rung 1 so the
repo is self-contained: clone + pip install is all that's needed to run
inference. Same rung-1 approach as vendor/pipecat_vad/data/silero_vad.onnx.
"""
